<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>관리자 - 파트너정형외과</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>

  <!-- 로그인 화면 -->
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">P</div>
        <h1>파트너<span>정형외과</span></h1>
        <p>관리자 로그인</p>
      </div>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>아이디</label>
          <input type="text" id="loginUsername" placeholder="관리자 아이디" required autocomplete="username">
        </div>
        <div class="form-group">
          <label>비밀번호</label>
          <input type="password" id="loginPassword" placeholder="비밀번호" required autocomplete="current-password">
        </div>
        <div id="loginError" class="error-msg" style="display:none"></div>
        <button type="submit" class="btn-login">로그인</button>
      </form>
      <a href="/" class="back-link">← 메인 사이트로 돌아가기</a>
    </div>
  </div>

  <!-- 관리자 대시보드 -->
  <div id="adminPanel" class="admin-panel" style="display:none">
    <!-- 사이드바 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo-icon">P</div>
        <span>관리자</span>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-tab="dashboard" onclick="switchTab('dashboard')">
          <span class="nav-icon">📊</span> 대시보드
        </a>
        <a href="#" class="nav-item" data-tab="notices" onclick="switchTab('notices')">
          <span class="nav-icon">📋</span> 공지사항
        </a>
        <a href="#" class="nav-item" data-tab="news" onclick="switchTab('news')">
          <span class="nav-icon">📰</span> 파트너 소식
        </a>
        <a href="#" class="nav-item" data-tab="popups" onclick="switchTab('popups')">
          <span class="nav-icon">🪟</span> 팝업 관리
        </a>
        <a href="#" class="nav-item" data-tab="consultations" onclick="switchTab('consultations')">
          <span class="nav-icon">💬</span> 상담 문의
          <span class="badge" id="pendingBadge" style="display:none">0</span>
        </a>
        <div class="nav-divider"></div>
        <a href="#" class="nav-item" data-tab="settings" onclick="switchTab('settings')">
          <span class="nav-icon">⚙️</span> 설정
        </a>
        <a href="#" class="nav-item" onclick="handleLogout()">
          <span class="nav-icon">🚪</span> 로그아웃
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="/" target="_blank">🌐 사이트 보기</a>
      </div>
    </aside>

    <!-- 메인 컨텐츠 -->
    <main class="main-content">
      <header class="content-header">
        <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
        <h2 id="pageTitle">대시보드</h2>
        <div class="header-right">
          <span class="admin-name">👤 관리자</span>
        </div>
      </header>

      <div class="content-body" id="contentBody">
        <!-- 동적으로 변경됨 -->
      </div>
    </main>
  </div>

  <!-- 모달 -->
  <div class="modal-overlay" id="modalOverlay" style="display:none">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modalTitle">제목</h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <script src="/admin/js/admin.js"></script>
</body>
</html>
