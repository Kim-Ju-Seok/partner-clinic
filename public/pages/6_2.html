<h2>온라인상담/예약</h2>
<p>아래 양식을 작성해 주시면, 빠른 시간 내에 연락드리겠습니다.</p>
<div class="consult-form">
    <div class="form-row">
        <div class="form-group"><label>이름 *</label><input type="text" placeholder="이름을 입력하세요" id="consultName"></div>
        <div class="form-group"><label>연락처 *</label><input type="tel" placeholder="010-0000-0000" id="consultPhone">
        </div>
    </div>
    <div class="form-row">
        <div class="form-group"><label>희망 진료과</label>
            <select id="consultDept">
                <option>선택하세요</option>
                <option>미세침습수술 클리닉</option>
                <option>비수술클리닉</option>
                <option>척추·관절클리닉</option>
                <option>도수·물리치료클리닉</option>
            </select>
        </div>
        <div class="form-group"><label>희망 날짜</label><input type="date" id="consultDate"></div>
    </div>
    <div class="form-group"><label>상담 내용 *</label><textarea placeholder="증상이나 문의사항을 자세히 적어주세요."
            id="consultMsg"></textarea></div>
    <button class="submit-btn" onclick="submitConsult()">상담 신청하기</button>
</div>
<div class="board-section" style="margin-top:40px">
    <h3>최근 상담 목록</h3>
    <table class="board-table">
        <thead>
            <tr>
                <th style="width:60px">번호</th>
                <th>내용</th>
                <th style="width:80px">작성자</th>
                <th style="width:100px">작성일</th>
                <th style="width:80px">상태</th>
            </tr>
        </thead>
        <tbody id="consultBody">
            <tr>
                <td colspan="5" style="text-align:center;padding:40px;color:#667085">로딩 중...</td>
            </tr>
        </tbody>
    </table>
</div>
<script>
    function loadConsultations() {
        fetch('/api/consultations').then(r => r.json()).then(data => {
            const body = document.getElementById('consultBody');
            if (!body) return;
            if (data.length === 0) { body.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px">상담 내역이 없습니다</td></tr>'; return; }
            body.innerHTML = data.map((c, i) => {
                const statusColor = c.status === '답변완료' ? 'var(--accent)' : 'var(--gold)';
                const date = c.created_at?.split('T')[0] || c.created_at;
                return `<tr><td>${data.length - i}</td><td>${c.message.substring(0, 30)}...</td><td>${c.name}</td><td>${date}</td><td style="color:${statusColor}">${c.status}</td></tr>`;
            }).join('');
        }).catch(() => {
            const body = document.getElementById('consultBody');
            if (body) body.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px">서버 연결이 필요합니다</td></tr>';
        });
    }
    loadConsultations();
</script>
