<h2>초음파유도정밀시술</h2>
<p>초음파 영상을 실시간으로 보면서 정확한 병변 부위에 주사하는 비수술 치료입니다. 방사선 노출 없이 안전하게 시술합니다.</p>
<div class="page-hero-img"><img src="https://images.unsplash.com/photo-1581595220892-b0739db3ba8c?w=800&q=80" alt="치료 안내"></div>
<h3>적응증</h3>
<p>관절염, 건초염, 점액낭염, 석회성 건염, 인대·힘줄 손상 등 다양한 근골격계 질환에 적용됩니다.</p>
<div class="info-box">
    <h4>장점</h4>
    <p>방사선 노출이 없어 안전하고, 실시간 영상을 보므로 정확한 위치에 시술이 가능합니다. 연부조직(근육, 힘줄, 인대)을 직접 관찰할 수 있습니다.</p>
</div>
