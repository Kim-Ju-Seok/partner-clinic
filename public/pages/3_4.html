<h2>신경성형술</h2>
<p>카테터(가는 관)를 이용하여 유착된 신경 주위 조직을 풀어주고, 약물을 직접 투여하는 비수술 치료법입니다.</p>
<div class="page-hero-img"><img src="https://images.unsplash.com/photo-1579684385127-1ef15d508118?w=800&q=80" alt="치료 안내"></div>
<h3>시술 과정</h3>
<p>꼬리뼈 부위에 1mm 정도의 특수 카테터를 삽입하여 C-ARM 영상 확인 하에 유착 부위를 박리하고 약물을 주입합니다.</p>
