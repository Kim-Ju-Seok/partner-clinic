<h2>양성종양 제거</h2>
<p>근골격계에 발생하는 양성 종양(결절종, 지방종 등)을 미세침습 방식으로 안전하게 제거합니다.</p>
<div class="page-hero-img"><img src="https://images.unsplash.com/photo-1631217868264-e5b90bb7e133?w=800&q=80"
        alt="양성종양 제거 수술"></div>
<h3>대상 질환</h3>
<p>결절종(가글리온), 지방종, 건초낭종, 피부낭종 등 다양한 양성 종양을 최소 절개로 제거합니다.</p>
<div class="info-box">
    <h4>수술 장점</h4>
    <p>최소 절개로 흉터가 거의 남지 않으며, 당일 수술 후 귀가 가능합니다. 조직검사를 통해 정확한 진단을 확인합니다.</p>
