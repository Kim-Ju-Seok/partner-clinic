<h2>관절가동술</h2>
<p>유착되거나 구축된 관절을 마취 하에 부드럽게 움직여 관절 운동 범위를 회복시키는 비수술 치료입니다.</p>

<h3>적응증</h3>
<p>오십견(동결견), 관절 수술 후 강직, 외상 후 관절 구축 등 관절의 움직임이 제한된 경우에 시행합니다.</p>
<div class="info-box">
    <h4>시술 방법</h4>
    <p>초음파 또는 C-ARM 유도 하에 관절 내에 약물을 주입한 후, 전문의가 관절을 다양한 방향으로 움직여 유착된 관절막을 풀어줍니다.</p>
