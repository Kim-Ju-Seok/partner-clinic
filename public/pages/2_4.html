<h2>방아쇠수지</h2>
<p>손가락이 굽힌 상태에서 펴지지 않거나 '딸깍' 소리가 나는 질환으로, 미세침습 수술로 치료합니다.</p>
<div class="page-hero-img"><img src="https://images.unsplash.com/photo-1579684385127-1ef15d508118?w=800&q=80"
        alt="방아쇠수지 치료"></div>
<h3>증상</h3>
<p>손가락을 구부렸다 펼 때 걸리는 느낌이나 딸깍 소리가 나며, 아침에 증상이 심해지는 경우가 많습니다.</p>
<div class="info-box">
    <h4>미세침습 치료</h4>
    <p>국소마취 하에 2~3mm 절개만으로 원인이 되는 힘줄의 활차(도르래)를 절개하여 치료합니다. 시술 시간 약 5분, 당일 귀가 가능합니다.</p>
</div>
